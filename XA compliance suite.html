                              <div className="absolute inset-0 flex items-center justify-center pointer-events-none overflow-hidden p-1">
                                <div className={`flex flex-col items-center justify-center ${params.isVertical ? '-rotate-90' : ''}`} style={{ maxWidth: '280px', width: '280px' }}>
                                  {params.isVertical ? (
                                    <>
                                      <span className={`text-sm font-bold whitespace-nowrap overflow-hidden text-ellipsis w-full text-center ${isLightColor ? 'text-slate-700' : 'text-white/90'}`}>{layer.name}</span>
                                      <span className={`text-xs font-bold mt-1 ${isLightColor ? 'text-slate-500' : 'text-white/70'}`}>{layer.thickness}mm</span>
                                    </>
                                  ) : (
                                    <span className={`text-sm font-bold whitespace-nowrap overflow-hidden text-ellipsis w-full text-center ${isLightColor ? 'text-slate-700' : 'text-white/90'}`}>
                                      {layer.name} <span className="opacity-80 font-medium">({layer.thickness}mm)</span>
                                    </span>
                                  )}
                                </div>
                              </div>
                            )}
                          </div>
                        )
                      })}

                      {/* Inside/Bottom Surface */}
                      {includeSurfaces && (
                        <div className={`${params.isVertical ? 'w-10 border-l border-slate-200' : 'h-8 border-t border-slate-200'} flex-shrink-0 bg-blue-50/50 flex items-center justify-center`}>
                          <div className="text-blue-500 font-bold tracking-widest text-[10px]" style={params.isVertical ? { writingMode: 'vertical-rl', transform: 'rotate(180deg)' } : {}}>
                            {params.inLabel}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Builder List */}
                  <div className="bg-slate-50 rounded-2xl border border-slate-200 overflow-hidden">
                    <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                      <h2 className="font-semibold text-slate-700 flex items-center gap-2">
                        <Layers className="w-5 h-5" /> Layer Builder ({params.outLabel} → {params.inLabel})
                      </h2>
                      <label className="flex items-center gap-2 cursor-pointer w-max">
                        <input type="checkbox" checked={includeSurfaces} onChange={(e) => toggleSurfaces(e.target.checked)} className="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" />
                        <span className="font-medium text-slate-600 text-xs uppercase tracking-wider">Include standard Air Films</span>
                      </label>
                    </div>
                    
                    <div className="p-4 space-y-3">
                      {layers.map((layer, index) => (
                        <div key={layer.id} className="flex items-stretch gap-3 p-4 bg-white border border-slate-200 rounded-xl hover:border-slate-300 transition-colors shadow-sm">
                          {/* Reorder controls */}
                          <div className="flex flex-col gap-1 items-center justify-center text-slate-400">
                            <button onClick={() => moveLayer(index, 'up')} disabled={index === 0} className="hover:text-blue-600 disabled:opacity-30"><ArrowUp className="w-4 h-4" /></button>
                            <GripVertical className="w-4 h-4 opacity-30" />
                            <button onClick={() => moveLayer(index, 'down')} disabled={index === layers.length - 1} className="hover:text-blue-600 disabled:opacity-30"><ArrowDown className="w-4 h-4" /></button>
                          </div>

                          <div className="flex-1 flex flex-col gap-3">
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end">
                              <div className="md:col-span-5">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Material</label>
                                <select value={layer.name} onChange={(e) => applyPreset(layer.id, e.target.value)} className="w-full text-sm border-slate-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-slate-50 p-2 border">
                                  {MATERIAL_PRESETS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
                                </select>
                              </div>
                              <div className="md:col-span-2">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Thick (mm)</label>
                                <input type="number" min="0" value={layer.thickness} onChange={(e) => updateLayer(layer.id, 'thickness', parseFloat(e.target.value) || 0)} className="w-full text-sm border-slate-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" />
                              </div>
                              <div className="md:col-span-3">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">{layer.type === 'material' ? 'k-value (W/mK)' : 'Fixed R-value'}</label>
                                <input type="number" step="0.001" min="0" value={layer.type === 'material' ? layer.kValue : layer.rValue} onChange={(e) => updateLayer(layer.id, layer.type === 'material' ? 'kValue' : 'rValue', parseFloat(e.target.value) || 0)} className="w-full text-sm border-slate-300 rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" />
                              </div>
                              <div className="md:col-span-2 flex justify-end pb-2 relative group">
                                <span className="text-sm font-mono font-medium text-slate-700 bg-slate-100 px-2 py-1 rounded cursor-help whitespace-nowrap">
                                  R: {getLayerRDisplay(layer)}
                                </span>
                                {/* Tooltip for smart resistances */}
                                {layer.type === 'resistance' && (layer.rValueUp !== undefined || layer.rValueDown !== undefined) && (
                                  <div className="absolute right-0 bottom-full mb-2 w-48 p-2 bg-slate-800 text-white text-[10px] rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-20">
                                    Smart Directional Resistance active for Winter(↑) and Summer(↓) conditions.
                                  </div>
                                )}
                              </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-end bg-slate-50/50 p-3 rounded-lg border border-slate-100">
                              <div className="md:col-span-3 md:col-start-6">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Density (kg/m³)</label>
                                <input type="number" min="0" value={layer.density || 0} onChange={(e) => updateLayer(layer.id, 'density', parseFloat(e.target.value) || 0)} className="w-full text-sm border-slate-200 rounded-md shadow-sm focus:border-orange-500 focus:ring-orange-500 p-1.5 border" />
                              </div>
                              <div className="md:col-span-3">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Sp. Heat (J/kgK)</label>
                                <input type="number" min="0" value={layer.specificHeat || 0} onChange={(e) => updateLayer(layer.id, 'specificHeat', parseFloat(e.target.value) || 0)} className="w-full text-sm border-slate-200 rounded-md shadow-sm focus:border-orange-500 focus:ring-orange-500 p-1.5 border" />
                              </div>
                            </div>
                          </div>
                          <div className="flex flex-col gap-2 items-center justify-center">
                            {layer.type === 'material' && layer.kValue > 0 && !isCompliant && (
                              <button onClick={() => autoSolveThickness(layer.id)} title="Auto-solve thickness to meet compliance" className="p-2 text-purple-400 hover:text-purple-600 hover:bg-purple-50 rounded-lg transition-colors">
                                <Wand2 className="w-4 h-4" />
                              </button>
                            )}
                            <button onClick={() => removeLayer(layer.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                              <Trash2 className="w-4 h-4" />
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div className="p-4 border-t border-slate-200">
                      <button onClick={addLayer} className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 font-medium shadow-sm"><Plus className="w-4 h-4" /> Add Layer to {activeTab}</button>
                    </div>
                  </div>
                </>
              )}
            </div>

          </div>

          {/* Shading Multiplier (Fs) Inline Modal */}
          {shadingModal.isOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
                <div className="px-5 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                  <h2 className="text-md font-bold text-slate-800 flex items-center gap-2">
                    <Calculator className="w-4 h-4 text-teal-600" />
                    Calculate Shading (Fs)
                  </h2>
                  <button onClick={() => setShadingModal(prev => ({...prev, isOpen: false}))} className="text-slate-400 hover:text-slate-700 transition-colors">
                    <X className="w-5 h-5" />
                  </button>
                </div>
                <div className="p-5 space-y-4">
                  <p className="text-xs text-slate-500">Based on SANS 10400-XA Table 5 (Projection Factor P<sub>h</sub>)</p>
                  <div>
                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Projection (P) in meters</label>
                    <input type="number" step="0.1" min="0" value={shadingModal.projection} onChange={(e) => setShadingModal(prev => ({...prev, projection: parseFloat(e.target.value) || 0}))} className="w-full text-sm border-slate-300 rounded focus:border-teal-500 focus:ring-teal-500 p-2 border" />
                    <p className="text-[10px] text-slate-400 mt-1">Horizontal distance the roof/eave overhangs the window.</p>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-600 uppercase mb-1">Height (H) in meters</label>
                    <input type="number" step="0.1" min="0.1" value={shadingModal.height} onChange={(e) => setShadingModal(prev => ({...prev, height: parseFloat(e.target.value) || 0}))} className="w-full text-sm border-slate-300 rounded focus:border-teal-500 focus:ring-teal-500 p-2 border" />
                    <p className="text-[10px] text-slate-400 mt-1">Vertical distance from window sill to underside of overhang.</p>
                  </div>
                  
                  <div className="bg-slate-50 p-3 rounded border border-slate-200 flex justify-between items-center">
                    <span className="text-xs font-bold text-slate-500">Calculated P<sub>h</sub>:</span>
                    <span className="text-sm font-mono font-bold text-slate-800">{(shadingModal.projection / (shadingModal.height || 1)).toFixed(2)}</span>
                  </div>
                </div>
                <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end">
                  <button onClick={applyShadingCalc} className="px-4 py-2 bg-teal-600 text-white text-sm font-bold rounded hover:bg-teal-700 transition-colors shadow-sm">Apply Fs Value</button>
                </div>
              </div>
            </div>
          )}

          {/* SANS 10400-XA Reference Modal */}
          {showHelp && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
                <div className="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                  <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <Info className="w-5 h-5 text-blue-600" />
                    SANS 10400-XA (2021) Reference & Data
                  </h2>
                  <button onClick={() => setShowHelp(false)} className="text-slate-400 hover:text-slate-700 transition-colors">
                    <X className="w-6 h-6" />
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto space-y-8">
                  <section>
                    <h3 className="text-md font-bold text-slate-800 border-b border-slate-200 pb-2 mb-3">1. Clause 4.2: Theoretical Energy Consumption (Performance Route)</h3>
                    <p className="text-sm text-slate-600 mb-3">If a building design cannot meet the prescriptive deemed-to-satisfy requirements for fenestration or the thermal envelope, compliance must be demonstrated via the Performance Route (Clause 4.2). This involves using certified thermal modeling software (e.g., EnergyPlus) to prove the building's theoretical energy demand falls below the maximum limits specified in SANS 10400-XA Tables 1 and 2.</p>
                  </section>

                  <section>
                    <h3 className="text-md font-bold text-slate-800 border-b border-slate-200 pb-2 mb-3">2. Fenestration (Glazing) Limitations</h3>
                    <p className="text-sm text-slate-600 mb-3">SANS 10400-XA 2021 provides self-contained rules for fenestration compliance:</p>
                    <ul className="list-disc pl-5 space-y-2 text-sm text-slate-600">
                      <li><strong>The 20% Exemption:</strong> If total fenestration is ≤ 20% of net floor area, no specific U-value or SHGC limits apply (any glazing passes).</li>
                      <li><strong>The 60% Hard Ceiling:</strong> If you exceed 60% of the net floor area, prescriptive compliance falls away entirely and you must commission a Rational Design (energy model).</li>
                      <li><strong>Aggregates:</strong> Between 20% and 60%, compliance is determined by the <em>Aggregate</em> Conductance (U-Value) and Solar Heat Gain (SHGC) of all windows combined. The targets become progressively stricter as your area ratio climbs.</li>
                      <li><strong>Table 4 (Section 5.3.5):</strong> Details the specific stepped maximum permitted U-Values and SHGC aggregates required for compliance.</li>
                      <li><strong>South Facing Exemption:</strong> Under Clause 5.3.5.5, fenestration facing South receives almost no direct sunlight, therefore its SHGC is taken as 0 for the purpose of the aggregate calculation.</li>
                      <li><strong>Shading Multipliers (Fs):</strong> Calculated using the Projection factor ($P_h = P / H$) referenced against Table 5 in the standard. This multiplier heavily reduces the effective solar heat gain of a window.</li>
                    </ul>
                  </section>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
