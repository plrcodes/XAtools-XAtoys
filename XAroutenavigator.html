<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XA Compliance Route Navigator - Edition 3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInBottom4 { from { transform: translateY(1rem); } to { transform: translateY(0); } }
        @keyframes slideInTop2 { from { transform: translateY(-0.5rem); } to { transform: translateY(0); } }
        @keyframes slideInTop4 { from { transform: translateY(-1rem); } to { transform: translateY(0); } }
        @keyframes slideInTop8 { from { transform: translateY(-2rem); } to { transform: translateY(0); } }
        @keyframes zoomIn95 { from { transform: scale(0.95); } to { transform: scale(1); } }
        
        .animate-in.fade-in { animation: fadeIn var(--tw-duration, 0.3s) ease-out forwards; }
        .animate-in.slide-in-from-bottom-4 { animation: fadeIn var(--tw-duration, 0.3s) ease-out forwards, slideInBottom4 var(--tw-duration, 0.3s) ease-out forwards; }
        .animate-in.slide-in-from-top-2 { animation: fadeIn var(--tw-duration, 0.3s) ease-out forwards, slideInTop2 var(--tw-duration, 0.3s) ease-out forwards; }
        .animate-in.slide-in-from-top-4 { animation: fadeIn var(--tw-duration, 0.3s) ease-out forwards, slideInTop4 var(--tw-duration, 0.3s) ease-out forwards; }
        .animate-in.slide-in-from-top-8 { animation: fadeIn var(--tw-duration, 0.3s) ease-out forwards, slideInTop8 var(--tw-duration, 0.3s) ease-out forwards; }
        .animate-in.zoom-in-95 { animation: fadeIn var(--tw-duration, 0.3s) ease-out forwards, zoomIn95 var(--tw-duration, 0.3s) ease-out forwards; }
        
        .duration-200 { --tw-duration: 200ms; }
        .duration-300 { --tw-duration: 300ms; }
        .duration-500 { --tw-duration: 500ms; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Inline SVG Icons (Minimalist) ---
        const IconCompass = ({ className = "", size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        );
        const IconX = ({ className = "", size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const IconInfo = ({ className = "", size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );
        const IconCheckCircle = ({ className = "", size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
        );
        const IconAlertTriangle = ({ className = "", size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        );
        const IconListChecks = ({ className = "", size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg>
        );
        const IconZap = ({ className = "", size = 24 }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="square" strokeLinejoin="miter" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        );

        const YES_NO = [
          { label: 'Yes', value: 'yes' },
          { label: 'No', value: 'no' }
        ];

        const YES_NO_NA = [
          { label: 'Yes', value: 'yes' },
          { label: 'No', value: 'no' },
          { label: 'N/A', value: 'na' }
        ];

        const OCCUPANCY_GROUPS = [
          {
            label: "A - Entertainment & Assembly",
            options: [
              { value: 'A1', label: 'A1 - Entertainment & public assembly' },
              { value: 'A2', label: 'A2 - Theatrical & indoor sport' },
              { value: 'A3', label: 'A3 - Places of instruction' },
              { value: 'A4', label: 'A4 - Worship' },
              { value: 'A5', label: 'A5 - Outdoor sport' }
            ]
          },
          { label: "B - Commercial Service", options: [{ value: 'B1', label: 'B1 - High risk commercial service' }, { value: 'B2', label: 'B2 - Moderate risk commercial service' }, { value: 'B3', label: 'B3 - Low risk commercial service' }] },
          { label: "C - Instruction & Exhibition", options: [{ value: 'C1', label: 'C1 - Exhibition hall' }, { value: 'C2', label: 'C2 - Museum' }] },
          { label: "D - Industrial", options: [{ value: 'D1', label: 'D1 - High risk industrial' }, { value: 'D2', label: 'D2 - Moderate risk industrial' }, { value: 'D3', label: 'D3 - Low risk industrial' }, { value: 'D4', label: 'D4 - Plant room' }] },
          { label: "E - Institutional", options: [{ value: 'E1', label: 'E1 - Place of detention' }, { value: 'E2', label: 'E2 - Hospital' }, { value: 'E3', label: 'E3 - Other institutional (residential)' }, { value: 'E4', label: 'E4 - Health care' }] },
          { label: "F - Shop & Wholesale", options: [{ value: 'F1', label: 'F1 - Large shop' }, { value: 'F2', label: 'F2 - Small shop' }, { value: 'F3', label: 'F3 - Wholesalers store' }] },
          { label: "G - Offices", options: [{ value: 'G1', label: 'G1 - Offices' }] },
          { label: "H - Residential", options: [{ value: 'H1', label: 'H1 - Hotel' }, { value: 'H2', label: 'H2 - Dormitory' }, { value: 'H3', label: 'H3 - Domestic residence (2+ dwellings)' }, { value: 'H4', label: 'H4 - Dwelling house' }, { value: 'H5', label: 'H5 - Hospitality' }] },
          { label: "J - Storage & Parking", options: [{ value: 'J1', label: 'J1 - High risk storage' }, { value: 'J2', label: 'J2 - Moderate risk storage' }, { value: 'J3', label: 'J3 - Low risk storage' }, { value: 'J4', label: 'J4 - Parking garage' }] }
        ];

        const APPLICABLE_OCCUPANCIES = ['A1', 'A2', 'A3', 'A4', 'C1', 'C2', 'E1', 'E2', 'E3', 'E4', 'F1', 'F2', 'F3', 'G1', 'H1', 'H2', 'H3', 'H4', 'H5'];
        const EPC_OCCUPANCIES = ['A1', 'A2', 'A3', 'A4', 'G1'];

        // Minimalist RadioSelect Component
        const RadioSelect = ({ label, reference, value, onChange, options = YES_NO }) => (
          <div className="mb-6 pb-6 border-b border-zinc-200/60 last:border-0 last:pb-0 transition-all">
            <div className="mb-4 flex flex-col sm:flex-row sm:items-start justify-between gap-2">
              <div className="font-semibold text-zinc-900 leading-snug text-sm sm:text-base max-w-lg">{label}</div>
              {reference && (
                <div className="text-[10px] sm:text-xs text-zinc-500 flex items-center gap-1.5 font-mono uppercase tracking-wider bg-zinc-100 px-2 py-1 shrink-0">
                  <IconInfo size={12} className="text-zinc-700"/>{reference}
                </div>
              )}
            </div>
            <div className="flex flex-wrap gap-2">
              {options.map(opt => (
                <button 
                  key={opt.value}
                  type="button"
                  onClick={() => onChange(opt.value)}
                  className={`flex-1 min-w-[80px] py-2 sm:py-2.5 text-sm font-semibold transition-colors border ${
                    value === opt.value 
                      ? 'bg-black border-black text-white' 
                      : 'bg-white border-zinc-300 text-zinc-500 hover:border-black hover:text-black'
                  }`}
                >
                  {opt.label}
                </button>
              ))}
            </div>
          </div>
        );

        // Shared Minimalist Result Card
        const ResultCard = ({ icon: Icon, title, subtitle, content, colorClass }) => (
          <div className={`text-left p-6 sm:p-8 border-l-4 ${colorClass} bg-white border-y border-r border-zinc-200 animate-in fade-in slide-in-from-bottom-4 duration-500 shadow-sm`}>
            <div className="flex items-start gap-4">
              <div className={`mt-1 shrink-0 ${colorClass.replace('border-', 'text-')}`}>
                <Icon size={32} />
              </div>
              <div>
                <h2 className="text-xl sm:text-2xl font-bold text-black mb-1 tracking-tight">{title}</h2>
                <p className="mb-4 text-zinc-500 font-mono text-xs uppercase tracking-widest">{subtitle}</p>
                <div className="text-sm sm:text-base text-zinc-700 leading-relaxed max-w-3xl space-y-3">
                  {content}
                </div>
              </div>
            </div>
          </div>
        );

        function App() {
          const [showInfo, setShowInfo] = useState(false);
          const [formData, setFormData] = useState({
            occupancy: '', garageStorage: null, greenCert: null, floorArea: '', storeys: '',
            tradeOffs: null, sccpLowE: null, 
            hotWater: null, roofs: null, walls: null, floors: null, 
            fenestration: null, shadingMultiplier: null, roofLights: null, services: null
          });

          const handleChange = (name, value) => {
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const isApplicableOccupancy = formData.occupancy !== '' && APPLICABLE_OCCUPANCIES.includes(formData.occupancy);
          const isExempt = (formData.occupancy !== '' && !isApplicableOccupancy) || formData.garageStorage === 'yes';
          const isApplicabilityComplete = formData.occupancy !== '' && (!isApplicableOccupancy || formData.garageStorage !== null);
          
          const isGreenCertBypass = formData.greenCert === 'yes';
          const isStrategyComplete = formData.greenCert === 'yes' || 
            (formData.greenCert === 'no' && formData.floorArea !== '' && formData.storeys !== '' && formData.tradeOffs !== null && formData.sccpLowE !== null);
          
          const isDealbreakerRational = formData.tradeOffs === 'yes' || formData.sccpLowE === 'yes';
          
          const isDtsRational = formData.hotWater === 'no' || formData.roofs === 'no' || formData.walls === 'no' || formData.floors === 'no' || formData.fenestration === 'no' || formData.shadingMultiplier === 'no' || formData.roofLights === 'no' || formData.services === 'no';
          
          const isDtsComplete = formData.hotWater !== null && formData.roofs !== null && formData.walls !== null && formData.floors !== null && formData.fenestration !== null && formData.shadingMultiplier !== null && formData.roofLights !== null && formData.services !== null;

          const showOptimizationTip = formData.greenCert === 'no' && 
            (Number(formData.storeys) > 3 || Number(formData.floorArea) >= 1000) && 
            !isDealbreakerRational && 
            !isDtsRational;
            
          const showEpcReminder = formData.greenCert === 'no' && EPC_OCCUPANCIES.includes(formData.occupancy) && Number(formData.floorArea) >= 1000;

          const showStrategySection = isApplicabilityComplete && !isExempt;
          const showDtsSection = showStrategySection && isStrategyComplete && !isGreenCertBypass && !isDealbreakerRational;

          const resetForm = () => {
            setFormData({
              occupancy: '', garageStorage: null, greenCert: null, floorArea: '', storeys: '', tradeOffs: null, sccpLowE: null,
              hotWater: null, roofs: null, walls: null, floors: null, fenestration: null, shadingMultiplier: null, roofLights: null, services: null
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const renderResult = () => {
            if (isExempt) {
              const exemptReason = formData.garageStorage === 'yes' 
                ? `Area is classified as a garage/storage space within an applicable occupancy (${formData.occupancy}). Explicitly excluded by Regulation XA1.`
                : `Occupancy Class ${formData.occupancy} is not listed in the applicability criteria of Regulation XA1.`;

              return <ResultCard 
                icon={IconCheckCircle} title="Exempt" subtitle="SANS 10400-XA Applicability" colorClass="border-emerald-500"
                content={
                  <>
                    <p>Based on the criteria provided, this building or structure is <strong>exempt</strong> and does not require compliance with the energy usage regulations outlined in SANS 10400-XA (Edition 3, 2026).</p>
                    <p className="pt-3 border-t border-zinc-100 text-xs font-mono text-zinc-500">REASON: {exemptReason}</p>
                  </>
                }
              />;
            }

            if (isGreenCertBypass) {
              return <ResultCard 
                icon={IconZap} title="Rational Design Recommended" subtitle="Compliance Route: Clause 4.3" colorClass="border-red-500"
                content={
                  <>
                    <p>Because this project is targeting a green building certification (e.g., Green Star, Net Zero, LEED), a full 3D energy model will be required by the sustainability consultant.</p>
                    <p>Under <strong>Clause 4.3</strong>, this certified software model can be used to prove the building's theoretical energy usage is equal to or less than a "reference building". This bypasses restrictive prescriptive tables, optimizing facade and material costs.</p>
                  </>
                }
              />;
            }

            if (formData.tradeOffs === 'yes') {
              return <ResultCard 
                icon={IconAlertTriangle} title="Rational Design Required" subtitle="Failure Point: Architectural Trade-Offs" colorClass="border-red-500"
                content={<p>The Deemed-to-Satisfy route requires strict adherence to all prescriptive values. Omitting insulation or deviating from standard envelope requirements mandates a Rational Design simulation to prove overall energy equivalence.</p>}
              />;
            }
            
            if (formData.sccpLowE === 'yes') {
              return <ResultCard 
                icon={IconAlertTriangle} title="Rational Design Required" subtitle="Failure Point: SCCP & Low-E Glass" colorClass="border-red-500"
                content={<p>Clause 5.3.7 strictly prohibits the use of single low-emissivity (low-e) glass to achieve fenestration U-values in the Southern Cape Condensation Problem Area (SCCP) due to condensation risks. You must either upgrade the glazing specification or proceed with a Rational Design simulation.</p>}
              />;
            }

            if (formData.hotWater === 'no') {
              return <ResultCard 
                icon={IconAlertTriangle} title="Rational Design Required" subtitle="Failure Point: Clause 4.1.1 (Hot Water)" colorClass="border-red-500"
                content={<p>Failing the requirement to provide 50% of the heating demand via alternative means prevents the use of the Deemed-to-Satisfy route. A full Rational Design by a Competent Person (Energy) is strictly required to prove equivalence.</p>}
              />;
            }

            if (isDtsRational) {
              return <ResultCard 
                icon={IconAlertTriangle} title="Rational Design Required" subtitle="Failure Point: Prescriptive Envelope or Services" colorClass="border-red-500"
                content={<p>Because one or more prescriptive requirements cannot be met using the standard tables (including limits on shading projection and roof lights), a full building energy simulation by a Competent Person (Energy) is required to prove compliance via the performance route.</p>}
              />;
            }

            return <ResultCard 
              icon={IconListChecks} title="Deemed-to-Satisfy Valid" subtitle="Compliance Route" colorClass="border-blue-500"
              content={<p>Project parameters indicate the prescriptive Deemed-to-Satisfy route is viable. Ensure all specifications (R-values, fenestration conductance, and shading/roof light limits) exactly match the Edition 3 (2026) tables and are documented on the municipal submission.</p>}
            />;
          };

          return (
            <div className="min-h-screen bg-[#999997] font-sans text-zinc-900 py-6 sm:py-12 px-4 sm:px-6 md:px-8 selection:bg-black selection:text-white flex justify-center">
              <div className="w-full max-w-3xl">
                
                {/* Minimalist Header */}
                <div className="bg-white border-t-4 border-black border-x border-b border-zinc-200 p-8 sm:p-10 mb-6 shadow-sm relative">
                  <div className="flex items-center justify-between gap-4 mb-3">
                    <div className="flex items-center gap-4">
                      <IconCompass className="text-black shrink-0" size={28} />
                      <h1 className="text-2xl sm:text-3xl font-black tracking-tight text-black uppercase">XA Route Navigator</h1>
                    </div>
                    <button 
                      onClick={() => setShowInfo(true)}
                      className="w-8 h-8 flex items-center justify-center border-2 border-zinc-300 rounded-full text-zinc-500 hover:border-black hover:text-black transition-colors font-bold text-sm shrink-0"
                      aria-label="About this tool"
                    >
                      ?
                    </button>
                  </div>
                  <p className="text-zinc-500 text-sm font-mono uppercase tracking-widest pl-11">Edition 3 (2026) Route Assessor</p>
                </div>

                {/* Main Form Content */}
                <div className="space-y-6">
                  
                  <div className="bg-white border border-zinc-200 p-6 sm:p-10 shadow-sm animate-in fade-in duration-300">
                    <h2 className="text-xs sm:text-sm font-mono text-zinc-500 uppercase tracking-widest mb-6 pb-4 border-b border-zinc-200">01 / Regulatory Applicability</h2>
                    
                    <div className="mb-6">
                      <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-2 mb-4">
                        <div className="font-semibold text-zinc-900 leading-snug text-sm sm:text-base">Select the primary Occupancy Class for this building/space.</div>
                        <div className="text-[10px] sm:text-xs text-zinc-500 flex items-center gap-1.5 font-mono uppercase tracking-wider bg-zinc-100 px-2 py-1 shrink-0">
                          <IconInfo size={12} className="text-zinc-700"/>Reg XA1 & A20
                        </div>
                      </div>
                      
                      <div className="relative">
                        <select 
                          value={formData.occupancy}
                          onChange={(e) => {
                            handleChange('occupancy', e.target.value);
                            handleChange('garageStorage', null);
                          }}
                          className="w-full p-3 sm:p-4 pl-4 pr-10 border border-zinc-300 bg-white text-black font-semibold text-sm sm:text-base focus:border-black focus:ring-1 focus:ring-black outline-none appearance-none cursor-pointer rounded-none transition-all"
                        >
                          <option value="">-- Select Occupancy Class --</option>
                          {OCCUPANCY_GROUPS.map((group, idx) => (
                            <optgroup key={idx} label={group.label} className="font-mono text-xs">
                              {group.options.map(opt => (
                                <option key={opt.value} value={opt.value} className="font-sans text-base">{opt.label}</option>
                              ))}
                            </optgroup>
                          ))}
                        </select>
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-black">
                          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="square" strokeLinejoin="miter" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                      </div>

                      {formData.occupancy !== '' && !isApplicableOccupancy && (
                        <div className="mt-4 p-4 border-l-2 border-zinc-400 bg-zinc-50 flex items-start gap-3 animate-in fade-in slide-in-from-top-2">
                          <IconCheckCircle className="text-zinc-700 shrink-0" size={18} />
                          <div>
                            <h4 className="text-xs font-bold text-black uppercase tracking-wider mb-1">Occupancy Exempt</h4>
                            <p className="text-sm text-zinc-600 leading-relaxed">Class <strong>{formData.occupancy}</strong> is not listed in Regulation XA1.</p>
                          </div>
                        </div>
                      )}
                      
                      {formData.occupancy !== '' && isApplicableOccupancy && (
                        <div className="mt-4 p-4 border-l-2 border-black bg-zinc-50 flex items-start gap-3 animate-in fade-in slide-in-from-top-2">
                          <IconInfo className="text-black shrink-0" size={18} />
                          <div>
                            <h4 className="text-xs font-bold text-black uppercase tracking-wider mb-1">Occupancy Regulated</h4>
                            <p className="text-sm text-zinc-600 leading-relaxed">Class <strong>{formData.occupancy}</strong> is subject to Regulation XA1 compliance.</p>
                          </div>
                        </div>
                      )}
                    </div>

                    {isApplicableOccupancy && (
                      <div className="animate-in fade-in slide-in-from-top-4 duration-300 pt-6 border-t border-zinc-100">
                        <RadioSelect 
                          value={formData.garageStorage}
                          onChange={(val) => handleChange('garageStorage', val)}
                          label={`Is this specific area exclusively a garage or storage space contained within the ${formData.occupancy} occupancy?`} 
                          reference="Regulation XA1 Exclusions"
                        />
                      </div>
                    )}
                  </div>

                  {/* Show Result immediately if exempt */}
                  {isExempt && renderResult()}

                  {/* Step 2: Project Strategy & Scale */}
                  {showStrategySection && (
                     <div className="bg-white border border-zinc-200 p-6 sm:p-10 shadow-sm animate-in fade-in slide-in-from-top-8 duration-500">
                        <h2 className="text-xs sm:text-sm font-mono text-zinc-500 uppercase tracking-widest mb-6 pb-4 border-b border-zinc-200">02 / Project Strategy & Scale</h2>
                        
                        <RadioSelect 
                          value={formData.greenCert}
                          onChange={(val) => handleChange('greenCert', val)}
                          label="Is this project targeting a recognized green building certification (e.g., Green Star, EDGE, LEED, Passivhaus, Net Zero)?" 
                          reference="Clause 4.3 Bypass"
                        />

                        {formData.greenCert === 'no' && (
                          <div className="animate-in fade-in slide-in-from-top-4 duration-300">
                            <div className="flex flex-col sm:flex-row gap-4 mb-8">
                              <div className="flex-1">
                                <label className="block font-semibold text-zinc-900 text-sm sm:text-base mb-2">Gross Floor Area (m²)</label>
                                <input 
                                  type="number" min="0" placeholder="e.g. 1500"
                                  value={formData.floorArea} onChange={(e) => handleChange('floorArea', e.target.value)} 
                                  className="w-full p-3 border border-zinc-300 focus:border-black focus:ring-1 focus:ring-black outline-none font-semibold rounded-none" 
                                />
                              </div>
                              <div className="flex-1">
                                <label className="block font-semibold text-zinc-900 text-sm sm:text-base mb-2">Number of Storeys</label>
                                <input 
                                  type="number" min="1" placeholder="e.g. 4"
                                  value={formData.storeys} onChange={(e) => handleChange('storeys', e.target.value)} 
                                  className="w-full p-3 border border-zinc-300 focus:border-black focus:ring-1 focus:ring-black outline-none font-semibold rounded-none" 
                                />
                              </div>
                            </div>

                            <RadioSelect 
                              value={formData.tradeOffs}
                              onChange={(val) => handleChange('tradeOffs', val)}
                              label="Do you intend to deliberately omit prescriptive elements to achieve an architectural aesthetic (e.g., exposed off-shutter concrete roofs, uninsulated feature walls)?" 
                              reference="DtS Prohibited"
                            />
                            
                            <RadioSelect 
                              value={formData.sccpLowE}
                              onChange={(val) => handleChange('sccpLowE', val)}
                              label="Is this project located in the Southern Cape Condensation Problem Area (SCCP) AND intending to use single low-emissivity (low-e) glass?" 
                              reference="Clause 5.3.7"
                            />
                          </div>
                        )}
                     </div>
                  )}

                  {/* Show bypass/dealbreaker results instantly */}
                  {(isGreenCertBypass || (formData.greenCert === 'no' && isDealbreakerRational)) && renderResult()}

                  {/* Sections 3 */}
                  {showDtsSection && (
                    <div className="bg-white border border-zinc-200 p-6 sm:p-10 shadow-sm animate-in fade-in slide-in-from-top-8 duration-500">
                      <h2 className="text-xs sm:text-sm font-mono text-zinc-500 uppercase tracking-widest mb-6 pb-4 border-b border-zinc-200">03 / Prescriptive (Deemed-to-Satisfy)</h2>
                      
                      <RadioSelect value={formData.hotWater} onChange={(val) => handleChange('hotWater', val)} label="Can you provide at least 50% of the annual hot water heating requirement via alternative means (e.g., solar, heat pump, waste heat)?" reference="Clause 4.1.1" options={YES_NO_NA} />
                      <RadioSelect value={formData.roofs} onChange={(val) => handleChange('roofs', val)} label="Will the roof assembly meet the minimum prescriptive Total R-value for the site's specific Energy Zone?" reference="Table 8" />
                      <RadioSelect value={formData.walls} onChange={(val) => handleChange('walls', val)} label="Will the external walls meet the minimum prescriptive thermal performance (CR-values or mass) for the site's specific Energy Zone?" reference="Clause 4.2.3" />
                      <RadioSelect value={formData.floors} onChange={(val) => handleChange('floors', val)} label="If the building has exposed/suspended concrete floors, or underfloor heating, will they be insulated to the prescriptive R-value?" reference="Clause 4.2.4" options={YES_NO_NA} />
                      <RadioSelect value={formData.shadingMultiplier} onChange={(val) => handleChange('shadingMultiplier', val)} label="If using external shading devices to meet fenestration limits on Northern/Eastern/Western facades, does the projection-to-height ratio meet the strict latitude multipliers?" reference="Table 3" options={YES_NO_NA} />
                      <RadioSelect value={formData.fenestration} onChange={(val) => handleChange('fenestration', val)} label="Can the design meet the prescribed Total Conductance and Solar Heat Gain limits for the specific window sizes, glass types, and shading used?" reference="Clause 4.2.5" />
                      <RadioSelect value={formData.roofLights} onChange={(val) => handleChange('roofLights', val)} label="If the design includes roof lights (skylights), do they comply with the specific area limits and thermal performance thresholds?" reference="Clause 5.3.9" options={YES_NO_NA} />
                      <RadioSelect value={formData.services} onChange={(val) => handleChange('services', val)} label="Will the building services (lighting power density, HVAC efficiency) comply with the prescriptive limits?" reference="Clause 4.2.6" options={YES_NO_NA} />

                    </div>
                  )}

                  {/* DtS Final Result */}
                  {showDtsSection && isDtsComplete && renderResult()}

                  {/* Dynamic Informational Banners (Bottom) */}
                  {(showOptimizationTip || showEpcReminder) && (
                    <div className="space-y-4 animate-in fade-in duration-500">
                      {showOptimizationTip && (
                        <div className="p-5 sm:p-6 bg-amber-50 border border-amber-200 shadow-sm flex items-start gap-4">
                          <IconInfo className="text-amber-600 mt-0.5 shrink-0" size={20} />
                          <div>
                            <h4 className="text-sm font-bold text-amber-900 uppercase tracking-widest mb-2">Optimization Tip</h4>
                            <p className="text-sm text-amber-800 leading-relaxed mb-3">For buildings of this scale and height, the Rational Design (Simulation) route is highly recommended. While Deemed-to-Satisfy is possible, an energy model allows you to trade off insulation and fenestration values, optimizing facade material costs.</p>
                            <p className="text-xs text-amber-900/70 font-mono">NOTE: Edition 3 (2026) tightens the maximum theoretical energy targets to 78% of the 2021 baseline.</p>
                          </div>
                        </div>
                      )}

                      {showEpcReminder && (
                        <div className="p-5 sm:p-6 bg-amber-50 border border-amber-200 shadow-sm flex items-start gap-4">
                          <IconAlertTriangle className="text-amber-600 mt-0.5 shrink-0" size={20} />
                          <div>
                            <h4 className="text-sm font-bold text-amber-900 uppercase tracking-widest mb-2">Energy Performance Certificate Required</h4>
                            <p className="text-sm text-amber-800 leading-relaxed mb-3">By law, specific buildings (including Class {formData.occupancy} &gt; 1,000m² for gov or &gt; 2,000m² for private) require a mandatory Energy Performance Certificate (EPC) once operational. Undertaking a Rational Design energy model now will establish a highly accurate baseline for your future EPC rating.</p>
                            <p className="text-xs text-amber-900/70 font-mono">NOTE: Edition 3 (2026) tightens the maximum theoretical energy targets to 78% of the 2021 baseline.</p>
                          </div>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Universal Reset Button */}
                  {(isExempt || isGreenCertBypass || (formData.greenCert === 'no' && isDealbreakerRational) || (showDtsSection && isDtsComplete)) && (
                    <div className="pt-6 pb-12 flex justify-center animate-in fade-in duration-500">
                      <button 
                        onClick={resetForm}
                        className="px-8 py-3 bg-white border-2 border-black text-black hover:bg-black hover:text-white font-bold uppercase text-xs tracking-widest transition-colors rounded-none shadow-sm"
                      >
                        Restart Assessment
                      </button>
                    </div>
                  )}

                </div>
              </div>

              {/* Info/Credits Modal */}
              {showInfo && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-900/40 backdrop-blur-sm animate-in fade-in duration-200">
                  <div className="bg-white border-t-4 border-black p-8 sm:p-10 max-w-md w-full shadow-2xl relative animate-in zoom-in-95 duration-200">
                    <button 
                      onClick={() => setShowInfo(false)} 
                      className="absolute top-4 right-4 text-zinc-400 hover:text-black transition-colors"
                      aria-label="Close"
                    >
                      <IconX size={24} />
                    </button>
                    <h3 className="text-lg font-black mb-4 uppercase tracking-tight text-black">About this tool</h3>
                    <p className="text-zinc-600 mb-6 text-sm leading-relaxed">
                      This navigator helps architects and building professionals quickly determine the required energy compliance route (Exempt, Deemed-to-Satisfy, or Rational Design) according to South Africa's SANS 10400-XA (Edition 3, 2026) energy usage in buildings regulations.
                    </p>
                    <a href="https://www.cpdcentral.co.za/courses/mastering-sans-10400-XA" target="_blank" rel="noopener noreferrer" className="inline-block mb-8 text-sm font-bold text-black border-b-2 border-black hover:text-zinc-600 hover:border-zinc-600 transition-colors pb-0.5">
                      Sign up for the deemed-to-satisfy XA course here
                    </a>
                    <div className="text-[11px] font-mono uppercase tracking-widest text-zinc-500 border-t border-zinc-200 pt-5">
                      Created by <a href="https://peterleroux.co.za" target="_blank" rel="noopener noreferrer" className="text-black hover:underline font-bold">peterleroux.co.za 2026</a>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
