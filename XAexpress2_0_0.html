        const newThickness = Math.ceil((layer.thickness + additionalThicknessMm) / 5) * 5; 
        handleLayerAction('update', layerId, 'thickness', newThickness);
      };

      const handleGlazingAction = (tab, action, id, field, value) => {
        if (tab === 'windows') {
          setFenestration(prev => {
            let newWindows = [...prev.windows];
            if (action === 'add') newWindows.push({ id: Math.random().toString(36).substr(2, 9), reference: `W${newWindows.length + 1}`, storey: value, name: 'New Window', qty: 1, width: 1.0, height: 1.0, uValue: 5.20, shgc: 0.60, shadingStatus: 'unshaded', glazingType: 'single_low_e' });
            else if (action === 'remove') newWindows = newWindows.filter(w => w.id !== id);
            else if (action === 'update') newWindows = newWindows.map(w => w.id === id ? { ...w, [field]: value } : w);
            else if (action === 'preset') {
              const preset = WINDOW_PRESETS.find(p => p.name === value);
              if (preset) newWindows = newWindows.map(w => w.id === id ? { ...w, uValue: preset.uValue, shgc: preset.shgc, glazingType: preset.type } : w);
            }
            return { ...prev, windows: newWindows };
          });
        } else if (tab === 'skylights') {
          setSkylights(prev => {
            let newSkylights = [...prev];
            if (action === 'add') newSkylights.push({ id: Math.random().toString(36).substr(2, 9), reference: `S${newSkylights.length + 1}`, spaceId: value, name: 'New Skylight', qty: 1, width: 1.0, height: 1.0, uValue: 5.80, shgc: 0.75 });
            else if (action === 'remove') newSkylights = newSkylights.filter(s => s.id !== id);
            else if (action === 'update') newSkylights = newSkylights.map(s => s.id === id ? { ...s, [field]: value } : s);
            else if (action === 'preset') {
              const preset = WINDOW_PRESETS.find(p => p.name === value);
              if (preset) newSkylights = newSkylights.map(s => s.id === id ? { ...s, uValue: preset.uValue, shgc: preset.shgc } : s);
            }
            return newSkylights;
          });
        }
      };

      const handleHvacAction = (action, id, field, value) => {
        setHvacEquipment(prev => {
          let newHvac = [...prev];
          if (action === 'add') newHvac.push({ id: Math.random().toString(36).substr(2, 9), name: `AC Unit ${newHvac.length + 1}`, type: 'unitary_split', capacity: 10, copC: 3.0, copH: 3.0, resViolation: false });
          else if (action === 'remove') newHvac = newHvac.filter(h => h.id !== id);
          else if (action === 'update') newHvac = newHvac.map(h => h.id === id ? { ...h, [field]: value } : h);
          return newHvac;
        });
      };

      const handleWaterAction = (type, action, id, field, value) => {
        const setter = type === 'equipment' ? setWaterEquipment : setWaterPipes;
        setter(prev => {
          let newData = [...prev];
          if (action === 'add') {
            if (type === 'equipment') newData.push({ id: Math.random().toString(36).substr(2, 9), name: `Solar / Heat Pump`, yield: 150 });
            else newData.push({ id: Math.random().toString(36).substr(2, 9), reference: `Pipe Loop`, diameter: 22, insulated: true });
          }
          else if (action === 'remove') newData = newData.filter(item => item.id !== id);
          else if (action === 'update') newData = newData.map(item => item.id === id ? { ...item, [field]: value } : item);
          return newData;
        });
      };

      const handleLightingAction = (action, id, field, value) => {
        setLightingFixtures(prev => {
          let newData = [...prev];
          if (action === 'add') newData.push({ id: Math.random().toString(36).substr(2, 9), spaceId: value, name: 'New Fixture', type: 'LED', qty: 1, watts: 10 });
          else if (action === 'remove') newData = newData.filter(f => f.id !== id);
          else if (action === 'update') newData = newData.map(f => f.id === id ? { ...f, [field]: value } : f);
          return newData;
        });
      };

      const getLayerStyle = (name) => {
        const n = (name || '').toLowerCase();
        if (n.includes('foil') || n.includes('radiant')) return { backgroundColor: 'rgba(239, 68, 68, 0.1)', border: '2px dashed #ef4444' };
        if (n.includes('brick')) return { backgroundColor: '#bd5b3b' };
        if (n.includes('plaster') || n.includes('render') || n.includes('screed')) return { backgroundColor: '#d4d4d8' };
        if (n.includes('concrete')) return { backgroundColor: '#94a3b8' };
        if (n.includes('insulation') || n.includes('eps') || n.includes('xps') || n.includes('glasswool')) return { backgroundColor: '#fef08a' };
        if (n.includes('air') || n.includes('space') || n.includes('cavity')) return { backgroundColor: '#eff6ff', backgroundImage: 'radial-gradient(#93c5fd 1px, transparent 1px)', backgroundSize: '8px 8px' };
        if (n.includes('board') || n.includes('gypsum')) return { backgroundColor: '#e7e5e4' };
        if (n.includes('steel') || n.includes('iron')) return { backgroundColor: '#64748b' };
        if (n.includes('timber') || n.includes('wood')) return { backgroundColor: '#d97706' };
        return { backgroundColor: '#e2e8f0' };
      };

      const generateVisualizerHtml = (layersToRender, incSurfaces, isVert, outLbl, inLbl) => {
          const totThick = layersToRender.reduce((acc, l) => acc + Number(l.thickness || 0), 0);
          
          let html = `<div style="width: 100%; display: flex; border: 2px solid #cbd5e1; border-radius: 8px; overflow: hidden; background-color: #f8fafc; margin-bottom: 20px; box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06); ${isVert ? 'height: 150px; flex-direction: row;' : 'height: 250px; flex-direction: column;'}">`;

          if (incSurfaces) {
              html += `<div style="${isVert ? 'width: 30px; border-right: 1px solid #e2e8f0;' : 'height: 25px; border-bottom: 1px solid #e2e8f0;'} background-color: #eff6ff; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                  <div style="color: #3b82f6; font-weight: bold; font-size: 8px; letter-spacing: 1px; text-align: center; width: 100%; ${isVert ? 'writing-mode: vertical-rl; transform: rotate(180deg);' : ''}">${outLbl}</div>
              </div>`;
          }

          layersToRender.forEach(layer => {
              const r = totThick > 0 ? (layer.thickness / totThick) * 100 : 0;
              const bg = getLayerStyle(layer.name);
              
              let sStr = Object.entries(bg).map(([k, v]) => {
                  const kb = k.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                  return `${kb}: ${v};`;
              }).join(' ');

              html += `<div style="${sStr} position: relative; display: flex; align-items: center; justify-content: center; box-sizing: border-box; flex-grow: ${layer.thickness}; flex-basis: ${r}%; ${isVert ? `border-right: 1px solid rgba(15,23,42,0.1); min-width: ${layer.thickness > 0 ? '24px' : '0'}; height: 100%;` : `border-bottom: 1px solid rgba(15,23,42,0.1); min-height: ${layer.thickness > 0 ? '24px' : '0'}; width: 100%;`}">`;
              
              if (layer.thickness >= 5) {
                  html += `<div style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 4px;">
                      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 280px; max-width: 280px; text-align: center; ${isVert ? 'transform: rotate(-90deg);' : ''}">
                          <span style="font-size: 10px; font-weight: bold; color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;">${layer.name}</span>
                          <span style="font-size: 9px; font-weight: bold; color: #64748b; margin-top: 2px;">${layer.thickness}mm</span>
                      </div>
                  </div>`;
              }
              html += `</div>`;
          });

          if (incSurfaces) {
              html += `<div style="${isVert ? 'width: 30px; border-left: 1px solid #e2e8f0;' : 'height: 25px; border-top: 1px solid #e2e8f0;'} background-color: #eff6ff; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                  <div style="color: #3b82f6; font-weight: bold; font-size: 8px; letter-spacing: 1px; text-align: center; width: 100%; ${isVert ? 'writing-mode: vertical-rl; transform: rotate(180deg);' : ''}">${inLbl}</div>
              </div>`;
          }

          html += `</div>`;
          return html;
      };

      const getTabHTML = (tab) => {
        if (isExempt) return `<div class="box"><h2 style="color:#059669; margin:0;">EXEMPT PROJECT</h2><p>Occupancy Class ${occupancy} is exempt from SANS 10400-XA calculations per Clause 4.2.</p></div>`;
        let h = '';
        if (tab === 'walls') {
            h += '<h2>Walls Assembly Schedule</h2>';
            assemblies.walls.forEach(w => {
                const phys = calculateAssemblyPhysics(w.layers, 'walls', w.includeSurfaces);
                const tgt = getTargetRequirements('walls', phys.surfaceMass, zone);
                const pass = phys.R >= tgt.R;
                h += `<div class="box" style="margin-bottom:20px;">
                    <h4>${w.name}</h4>
                    <p>Class: ${phys.surfaceMass >= 270 ? 'Heavyweight' : 'Lightweight'}</p>
                    <p>Target R-Value: ${tgt.R.toFixed(2)}</p>
                    <p>Total R-Value: <span class="${pass?'pass':'fail'}">${phys.R.toFixed(2)}</span></p>
                    <h4 style="margin-top:15px; margin-bottom:5px; font-size:12px; color:#64748b; text-transform:uppercase;">Assembly Cross-Section</h4>
                    ${generateVisualizerHtml(w.layers, w.includeSurfaces, true, 'OUTSIDE', 'INSIDE')}
                </div>`;
            });
        }
        else if (tab === 'roofs') {
            h += '<h2>Roof Assembly Schedule</h2>';
            assemblies.roofs.forEach(r => {
                const p = calculateAssemblyPhysics(r.layers, 'roofs', r.includeSurfaces, r.isPitchedRoof);
                const t = getTargetRequirements('roofs', 0, zone);
                const pass = p.R_up >= t.R_up && p.R_down >= t.R_down;
                h += `<div class="box" style="margin-bottom:20px;">
                    <h4>${r.name}</h4>
                    <p>Profile: ${r.isPitchedRoof ? 'Pitched' : 'Flat'}</p>
                    <table><tr><th>Direction</th><th>Target R</th><th>Total R</th></tr><tr><td>WINTER (Up)</td><td>${t.R_up.toFixed(2)}</td><td>${p.R_up.toFixed(2)}</td></tr><tr><td>SUMMER (Down)</td><td>${t.R_down.toFixed(2)}</td><td>${p.R_down.toFixed(2)}</td></tr></table><p class="${pass?'pass':'fail'}">Status: ${pass?'COMPLIANT':'NON-COMPLIANT'}</p>
                    <h4 style="margin-top:15px; margin-bottom:5px; font-size:12px; color:#64748b; text-transform:uppercase;">Assembly Cross-Section</h4>
                    ${generateVisualizerHtml(r.layers, r.includeSurfaces, false, 'OUTSIDE (ROOF)', 'INSIDE (CEILING)')}
                </div>`;
            });
        }
        else if (tab === 'floors') {
            h += '<h2>Floor Assembly Schedule</h2>';
            assemblies.floors.forEach(f => {
                const p = calculateAssemblyPhysics(f.layers, 'floors', f.includeSurfaces, false, f.floorType, f.floorHeating);
                const t = getTargetRequirements('floors', 0, zone, f.floorType, f.floorHeating);
                const pass = p.R >= t.R;
                h += `<div class="box" style="margin-bottom:20px;">
                    <h4>${f.name}</h4>
                    <p>System: ${f.floorType === 'suspended' ? 'Suspended Slab' : 'Slab on Ground'} ${f.floorHeating ? '(Heated)' : ''}</p>
                    <p>Target R-Value: ${t.R.toFixed(2)}</p>
                    <p>Total R-Value: <span class="${pass?'pass':'fail'}">${p.R.toFixed(2)}</span></p>
                    <h4 style="margin-top:15px; margin-bottom:5px; font-size:12px; color:#64748b; text-transform:uppercase;">Assembly Cross-Section</h4>
                    ${generateVisualizerHtml(f.layers, f.includeSurfaces, false, 'INSIDE (TOP)', f.floorType === 'ground' ? 'OUTSIDE (GROUND)' : 'OUTSIDE (CRAWLSPACE)')}
                </div>`;
            });
        }
        else if (tab === 'fenestration') {
            h += '<h2>Fenestration Schedule</h2>';
            if (fenestrationData.global.totalWinArea === 0) return h + '<p>No fenestration specified.</p>';
            const g = fenestrationData.global;
            h += `<div class="box"><p>Total Area: ${g.totalWinArea.toFixed(2)} m² (${g.ratio.toFixed(1)}%)</p><p>Global U: ${g.aggU.toFixed(2)}</p><p>Global SHGC: ${g.aggSHGC.toFixed(2)}</p><p class="${g.isCompliant?'pass':'fail'}">Status: ${g.isCompliant?'COMPLIANT':'NON-COMPLIANT'}</p></div>`;
            fenestrationData.storeys.filter(s => s.windows.length > 0).forEach(s => {
                h += `<div class="storey-header">Storey ${s.storeyIndex + 1}</div><table><thead><tr><th>Ref</th><th>Description</th><th>Shading</th><th>Qty</th><th>W x H</th><th>Area (m²)</th><th>U</th><th>SHGC</th></tr></thead><tbody>`;
                s.windows.forEach(w => { h += `<tr><td>${w.reference}</td><td>${w.name}</td><td style="text-transform:capitalize;">${w.shadingStatus}</td><td>${w.qty}</td><td>${w.width}x${w.height}</td><td>${(w.qty*w.width*w.height).toFixed(2)}</td><td>${w.uValue.toFixed(2)}</td><td>${w.shadingStatus==='south'?'0.00':w.shgc.toFixed(2)}</td></tr>`; });
                h += `</tbody></table>`;
            });
        }
        else if (tab === 'skylights') {
            h += '<h2>Skylights Schedule</h2>';
            if (skylightData.global.totalSkyArea === 0) return h + '<p>No skylights specified.</p>';
            h += `<div class="box"><p>Total Area: ${skylightData.global.totalSkyArea.toFixed(2)} m² (${skylightData.global.ratio.toFixed(1)}%)</p><p class="${skylightData.global.isCompliant?'pass':'fail'}">Status: ${skylightData.global.isCompliant?'ALL SPACES COMPLIANT':'NON-COMPLIANT SPACES FOUND'}</p></div>`;
            skylightData.spaces.filter(s => s.skylights.length > 0).forEach(s => {
                h += `<div class="storey-header">${s.name}</div><table><thead><tr><th>Ref</th><th>Description</th><th>Qty</th><th>W x H</th><th>Area (m²)</th><th>U</th><th>SHGC</th></tr></thead><tbody>`;
                s.skylights.forEach(sky => { h += `<tr><td>${sky.reference}</td><td>${sky.name}</td><td>${sky.qty}</td><td>${sky.width}x${sky.height}</td><td>${(sky.qty*sky.width*sky.height).toFixed(2)}</td><td>${sky.uValue.toFixed(2)}</td><td>${sky.shgc.toFixed(2)}</td></tr>`; });
                h += `</tbody></table>`;
            });
        }
        else if (tab === 'lighting') {
            h += '<h2>Lighting Power Density Schedule</h2>';
            if (!lightingData.hasFixtures) return h + '<p>No fixtures specified.</p>';
            h += `<div class="box"><p>Total Power: ${lightingData.globalWatts.toFixed(1)} W</p><p>Global LPD: ${lightingData.globalLpd.toFixed(2)} W/m²</p><p>Target: ${lightingData.targetLPD} W/m²</p><p class="${lightingData.isCompliant || lightingData.isResidentialExempt?'pass':'fail'}">Status: ${lightingData.isCompliant || lightingData.isResidentialExempt?'COMPLIANT':'NON-COMPLIANT'}</p></div>`;
            lightingData.spaces.filter(s => s.fixtures.length > 0).forEach(s => {
                h += `<div class="storey-header">${s.name}</div><table><thead><tr><th>Description</th><th>Type</th><th>Qty</th><th>Watts</th><th>Total</th></tr></thead><tbody>`;
                s.fixtures.forEach(f => { h += `<tr><td>${f.name}</td><td>${f.type}</td><td>${f.qty}</td><td>${f.watts} W</td><td>${(f.qty*f.watts).toFixed(1)} W</td></tr>`; });
                h += `</tbody></table>`;
            });
        }
        else if (tab === 'water') {
            h += '<h2>Water Heating Schedule</h2>';
            if (waterExempt) return h + '<div class="box"><p class="pass">EXEMPT (No Hot Water Services Installed)</p></div>';
            h += `<div class="box"><p>Total Demand: ${waterData.totalDemand.toFixed(1)} L/day</p><p>Target 50% Yield: ${waterData.targetYield.toFixed(1)} L/day</p><p>Alternative Yield: ${waterData.totalYield.toFixed(1)} L/day</p><p class="${waterData.isCompliant?'pass':'fail'}">Status: ${waterData.isCompliant?'COMPLIANT':'NON-COMPLIANT'}</p></div>`;
            if (waterEquipment.length > 0) {
                h += `<table><thead><tr><th>Ref</th><th>Description</th><th>Yield (L/day)</th></tr></thead><tbody>`;
                waterEquipment.forEach(eq => h += `<tr><td>${eq.id.substring(0,6)}</td><td>${eq.name}</td><td>${eq.yield} L</td></tr>`);
                h += `</tbody></table>`;
            }
            h += `<h3>Pipe Insulation Schedule (SANS 10252-1)</h3>`;
            if (waterPipes.length > 0) {
                h += `<table><thead><tr><th>Reference</th><th>Diameter (mm)</th><th>Target R-Value</th><th>Compliant</th></tr></thead><tbody>`;
                waterPipes.forEach(p => {
                    const reqR = p.diameter <= 80 ? 1.00 : 1.50;
                    h += `<tr><td>${p.reference}</td><td>${p.diameter} mm</td><td>R-${reqR.toFixed(2)}</td><td class="${p.insulated?'pass':'fail'}">${p.insulated?'YES':'NO'}</td></tr>`;
                });
                h += `</tbody></table>`;
            } else {
                h += `<p>No pipes specified.</p>`;
            }
        }
        else if (tab === 'hvac') {
            h += '<h2>HVAC Equipment Efficiency Schedule</h2>';
            if (hvacExempt) return h + '<div class="box"><p class="pass">EXEMPT (No Air-Conditioning / Natural Ventilation)</p></div>';
            if (!hvacData.hasEquipment) return h + '<p>No HVAC equipment specified.</p>';
            h += `<div class="box"><p>Status: <span class="${hvacData.isCompliant?'pass':'fail'}">${hvacData.isCompliant?'COMPLIANT':'NON-COMPLIANT'}</span></p></div>`;
            h += `<table><thead><tr><th>Ref</th><th>Type</th><th>Capacity</th><th>COP (Cooling)</th><th>COP (Heating)</th><th>Status</th></tr></thead><tbody>`;
            hvacData.equipment.forEach(eq => {
                const typeName = HVAC_EQUIPMENT_TYPES.find(t=>t.id===eq.type)?.name || eq.type;
                h += `<tr><td>${eq.name}</td><td>${typeName}</td><td>${eq.capacity} kW</td><td>${eq.copC.toFixed(2)} (Min ${eq.limits.copC.toFixed(2)})</td><td>${eq.limits.reqHeating ? `${eq.copH.toFixed(2)} (Min ${eq.limits.copH.toFixed(2)})` : 'N/A'}</td><td class="${eq.isCompliant?'pass':'fail'}">${eq.isCompliant?'PASS':'FAIL'}</td></tr>`;
            });
            h += `</tbody></table>`;
        }
        return h;
      };

      const runReport = (title, contentHTML) => {
        const reportDate = new Date().toLocaleDateString('en-ZA', { year: 'numeric', month: 'long', day: 'numeric' });
        const occName = OCCUPANCY_CLASSES.find(o => o.id === occupancy)?.name || occupancy;
        const projType = projectInfo.projectType === 'new' ? 'New Building' : 'Alteration/Addition';

        const finalHtml = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>${projectInfo.projectName || 'Building'} - XA Express Report</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; color: #1e293b; max-width: 800px; margin: 0 auto; font-size: 13px; }
              .header { border-bottom: 3px solid #cbd5e1; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;}
              h1 { color: #0f172a; margin: 0 0 10px 0; font-size: 24px; } h2 { color: #1e293b; font-size: 18px; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; margin-bottom: 20px; margin-top: 0;}
              h3 { font-size: 16px; margin-top: 25px; margin-bottom: 10px; color: #334155; } h4 { font-size: 14px; margin-bottom: 5px; color: #475569; }

              .pass { color: #059669; font-weight: bold; } .fail { color: #dc2626; font-weight: bold; }
              table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 30px; } th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; } th { background-color: #f1f5f9; color: #475569; }
              .storey-header { background: #e2e8f0; padding: 10px 15px; border-radius: 6px 6px 0 0; margin-top: 20px; border: 1px solid #cbd5e1; border-bottom: none; font-weight: bold; color: #334155; display: flex; justify-content: space-between;}
              @media print { 
              * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            }
          </style>
          </head><body>
            ${(officeInfo.logoDataUrl || officeInfo.companyName) ? `<div style="margin-bottom: 30px; display: flex; align-items: center; gap: 20px;">${officeInfo.logoDataUrl ? `<img src="${officeInfo.logoDataUrl}" style="max-height: 60px; max-width: 250px; object-fit: contain;" />` : ''}${officeInfo.companyName ? `<h2 style="margin: 0; color: #334155; font-size: 20px; border:none; padding:0;">${officeInfo.companyName}</h2>` : ''}</div>` : ''}
            <div class="header"><div><h1>${title}</h1><p style="color: #0f172a; font-weight: bold; margin-bottom: 5px;">XA 2026 3rd edition deemed-to-satisfy calculator</p><p class="date">${reportDate} | ${projType}</p></div>
              <div class="proj-details"><strong>${projectInfo.projectName || 'Untitled'}${projectInfo.standNumber ? ` - Stand ${projectInfo.standNumber}` : ''}${projectInfo.township ? `, ${projectInfo.township}` : ''}</strong><br/>Lat ${projectInfo.latitude}°S | Zone ${zone}<br/>${projectInfo.isSccp ? 'SCCP Active' : 'No SCCP'}</div>
            </div>
            <div style="padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; margin-bottom: 30px;">
              <h3 style="margin-top: 0; color: #334155; font-size: 14px; text-transform: uppercase;">Project Parameters</h3>
              <p><strong>Occupancy Class:</strong> ${occName}</p><p><strong>Total Net Floor Area:</strong> ${totalFloorArea.toFixed(2)} m²</p><p><strong>Storeys:</strong> ${projectInfo.storeys}</p>
            </div>
            ${contentHTML}
            ${(officeInfo.registeredProfessional || officeInfo.sacapNumber) ? `<div style="margin-top: 50px; padding-top: 20px; border-top: 2px solid #cbd5e1; display:flex; justify-content: space-between; color: #475569; font-size: 14px;"><div><strong>Prepared by:</strong> ${officeInfo.registeredProfessional || '_____________________'}</div><div><strong>SACAP Registration Number:</strong> ${officeInfo.sacapNumber || '_____________________'}</div></div>` : ''}
            <script>window.onload = () => { setTimeout(() => { window.print(); }, 500); };<\/script></body></html>`;
        const blob = new Blob([finalHtml], { type: 'text/html;charset=utf-8' });
        window.open(URL.createObjectURL(blob), '_blank');

                    <div className="flex-1 w-full space-y-4">
                      <div><h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2">HVAC Calculator</h1><p className="text-slate-500 mt-1">SANS 10400-XA:2026 (Table 11) Equipment Efficiency</p></div>
                      
                      <label className="flex items-center gap-3 cursor-pointer bg-slate-50 p-4 rounded-xl border border-slate-200 w-max hover:bg-slate-100 transition-colors shadow-sm">
                        <input type="checkbox" checked={hvacExempt} onChange={(e) => setHvacExempt(e.target.checked)} className="w-5 h-5 text-blue-600 rounded border-slate-300 cursor-pointer" />
                        <div className="flex flex-col">
                          <span className="font-bold text-slate-700">No Air-Conditioning (Natural Ventilation)</span>
                          <span className="text-xs text-slate-500">Project does not use unitary or packaged HVAC equipment.</span>
                        </div>
                      </label>

                      {hvacExempt && (
                        <div className="bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm p-4 rounded-xl flex items-start gap-2 shadow-sm">
                          <CheckCircle className="w-5 h-5 text-emerald-600 flex-shrink-0 mt-0.5" />
                          <div><strong>DEEMED TO COMPLY:</strong> The project is exempt from mechanical cooling/heating efficiency requirements.</div>
                        </div>
                      )}

                      {!hvacExempt && !hvacData.isCompliant && hvacData.hasEquipment && (
                         <div className="bg-red-50 border border-red-200 text-red-800 text-sm p-3 rounded-lg flex items-start gap-2 shadow-sm">
                           <XCircle className="w-5 h-5 text-red-600 flex-shrink-0 mt-0.5" />
                           <div><strong>COMPLIANCE FAILURE:</strong> One or more HVAC units do not meet the minimum COP requirements from Table 11.</div>
                         </div>
                      )}

                      <div className="flex flex-wrap items-center gap-3 pt-2">
                        <button onClick={exportPDF} className="flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-lg shadow-sm text-sm hover:bg-slate-700"><FileText className="w-4 h-4" /> Export Current Tab</button>
                      </div>
                    </div>
                  </div>

                  {!hvacExempt && (
                    <div className="space-y-6">
                      {hvacData.equipment.length === 0 && (
                        <div className="text-center py-12 text-slate-500 bg-slate-50 rounded-xl border border-slate-200 border-dashed">
                          No HVAC equipment added. Click the button below to start.
                        </div>
                      )}
                      
                      {hvacData.equipment.map((eq) => (
                        <div key={eq.id} className={`flex flex-col md:flex-row gap-4 p-5 bg-white border rounded-xl shadow-sm relative ${eq.isCompliant ? 'border-slate-200' : 'border-red-300 bg-red-50/20'}`}>
                          
                          <div className="flex-1 space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-4">
                              <div className="md:col-span-3"><label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Unit Reference</label><input type="text" value={eq.name} onChange={(e) => handleHvacAction("update", eq.id, 'name', e.target.value)} className="w-full text-sm font-semibold border-slate-300 rounded shadow-sm p-2 border text-slate-800" /></div>
                              <div className="md:col-span-6">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Equipment Type (Table 11)</label>
                                <select value={eq.type} onChange={(e) => handleHvacAction("update", eq.id, 'type', e.target.value)} className="w-full text-sm border-slate-300 rounded shadow-sm p-2 border bg-slate-50">
                                  {HVAC_EQUIPMENT_TYPES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                </select>
                              </div>
                              <div className="md:col-span-3"><label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Capacity (kW)</label><input type="number" step="0.1" min="0" value={eq.capacity} onChange={(e) => handleHvacAction("update", eq.id, 'capacity', parseFloat(e.target.value) || 0)} className="w-full text-sm border-slate-300 rounded shadow-sm p-2 border" /></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-4 bg-slate-50/50 p-4 rounded-lg border border-slate-100 items-start">
                              <div className="md:col-span-4">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Specified COP (Cooling)</label>
                                <input type="number" step="0.1" min="0" value={eq.copC} onChange={(e) => handleHvacAction("update", eq.id, 'copC', parseFloat(e.target.value) || 0)} className={`w-full text-sm font-bold border-slate-300 rounded shadow-sm p-2 border ${eq.passC ? 'text-slate-800' : 'text-red-600 bg-red-50 border-red-300'}`} />
                                <div className="text-[10px] text-slate-500 mt-1">Minimum required: <strong>{eq.limits.copC.toFixed(1)}</strong></div>
                              </div>
                              <div className="md:col-span-4">
                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Specified COP (Heating)</label>
                                <input type="number" step="0.1" min="0" value={eq.copH} onChange={(e) => handleHvacAction("update", eq.id, 'copH', parseFloat(e.target.value) || 0)} disabled={!eq.limits.reqHeating} className={`w-full text-sm font-bold border-slate-300 rounded shadow-sm p-2 border ${!eq.limits.reqHeating ? 'bg-slate-200 text-slate-400 cursor-not-allowed line-through' : eq.passH ? 'text-slate-800' : 'text-red-600 bg-red-50 border-red-300'}`} />
                                <div className="text-[10px] text-slate-500 mt-1">{eq.limits.reqHeating ? <>Minimum required: <strong>{eq.limits.copH.toFixed(1)}</strong></> : 'Heating efficiency not applicable.'}</div>
                              </div>
                              <div className="md:col-span-4 flex flex-col justify-center h-full">
                                <label className="flex items-start gap-2 cursor-pointer p-2 hover:bg-slate-100 rounded-md transition-colors border border-transparent hover:border-slate-200">
                                  <input type="checkbox" checked={eq.resViolation} onChange={(e) => handleHvacAction("update", eq.id, 'resViolation', e.target.checked)} className="mt-0.5 text-blue-600 rounded" />
                                  <span className="text-[11px] font-medium text-slate-600 leading-tight">Resistance heating power exceeds cooling power</span>
                                </label>
                                {eq.resistanceFail && <div className="text-[10px] font-bold text-red-600 px-2 mt-1">Violates Note (a) (Capacity ≥ 10kW)</div>}
                              </div>
                            </div>
                          </div>

                          <div className="flex flex-col gap-2 items-center justify-center border-l border-slate-100 pl-4">
                            <button onClick={() => handleHvacAction("remove", eq.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg"><Trash2 className="w-4 h-4" /></button>
                          </div>
                        </div>
                      ))}
                      
                      <button onClick={() => handleHvacAction("add")} className="flex items-center gap-2 px-4 py-2 bg-slate-50 border border-slate-300 text-slate-700 rounded-lg shadow-sm text-sm hover:bg-slate-100 font-medium"><Plus className="w-4 h-4" /> Add HVAC Equipment</button>
                    </div>
                  )}
                </>
              )}

            </div> {/* Closes the Active Tab Content div */}
            {/* --- SETTINGS MODAL --- */}
            {isSettingsModalOpen && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                  <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h2 className="font-bold text-slate-800 flex items-center gap-2"><Settings className="w-5 h-5 text-indigo-600" /> Office Configuration</h2>
                    <button onClick={() => setIsSettingsModalOpen(false)} className="text-slate-400 hover:text-slate-600 transition-colors"><X className="w-5 h-5" /></button>
                  </div>
                  <div className="p-6 space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Company Name</label>
                      <input type="text" value={officeInfo.companyName} onChange={(e) => handleOfficeUpdate('companyName', e.target.value)} className="w-full text-sm border-slate-300 rounded-lg p-2.5 border" placeholder="Enter company name" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Registered Professional</label>
                      <input type="text" value={officeInfo.registeredProfessional} onChange={(e) => handleOfficeUpdate('registeredProfessional', e.target.value)} className="w-full text-sm border-slate-300 rounded-lg p-2.5 border" placeholder="e.g. Jane Doe" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">SACAP Registration Number</label>
                      <input type="text" value={officeInfo.sacapNumber} onChange={(e) => handleOfficeUpdate('sacapNumber', e.target.value)} className="w-full text-sm border-slate-300 rounded-lg p-2.5 border" placeholder="e.g. PrArch 12345" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Company Logo (Max 1MB)</label>
                      <input type="file" accept="image/*" onChange={handleLogoUpload} className="w-full text-sm border-slate-300 rounded-lg p-2 border file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
                      {officeInfo.logoDataUrl && (
                        <div className="mt-3 relative inline-block">
                          <img src={officeInfo.logoDataUrl} alt="Logo Preview" className="h-12 object-contain border rounded p-1" />
                          <button onClick={() => handleOfficeUpdate('logoDataUrl', '')} className="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full p-1 hover:bg-red-200"><X className="w-3 h-3" /></button>
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end">
                    <button onClick={() => setIsSettingsModalOpen(false)} className="px-5 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-500">Save & Close</button>
                  </div>
                </div>
              </div>
            )}

            {/* --- HELP MODAL --- */}
            {isHelpModalOpen && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in duration-200">
                  <div className="bg-slate-100 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h2 className="font-bold text-slate-800 flex items-center gap-2"><HelpCircle className="w-5 h-5 text-indigo-600" /> Help & About</h2>
                    <button onClick={() => setIsHelpModalOpen(false)} className="text-slate-400 hover:text-slate-600 transition-colors"><X className="w-5 h-5" /></button>
                  </div>
                  <div className="p-6 space-y-4 text-sm text-slate-600">
                    <p><strong>XA Express</strong> is a Deemed-to-Satisfy calculator designed for compliance with the SANS 10400-XA 2026 (3rd Edition) regulations.</p>
                    <hr className="border-slate-200" />
                    <h3 className="font-bold text-slate-800">Quick Tips:</h3>
                    <ul className="list-disc pl-5 space-y-2">
                      <li>Ensure your <strong>Climate Zone</strong> is set correctly on the Project tab, as it dictates all baseline performance targets.</li>
                      <li>Use the <strong>Layer Builder</strong> in the Walls, Roofs, and Floors tabs to construct assemblies from outside to inside.</li>
                      <li>If your project is in an <strong>SCCP Area</strong>, single Low-E glazing will automatically flag as non-compliant due to condensation risks.</li>
                      <li>All data is saved locally in your browser cache. Clearing your browser data will reset the application.</li>
                    </ul>
                    <div className="mt-6 space-y-4">
                      <div className="p-4 bg-indigo-50 rounded-xl border border-indigo-100 text-center transition-colors hover:bg-indigo-100/50">
                        <a href="https://www.cpdcentral.co.za/courses/mastering-sans-10400-XA" target="_blank" rel="noopener noreferrer" className="text-sm font-bold text-indigo-700 hover:text-indigo-800 flex items-center justify-center gap-1.5">
                          Sign up for the Mastering SANS 10400-XA 3rd edition course on CPD Central <ExternalLink className="w-4 h-4" />
                        </a>
                      </div>
                      
                      <div className="flex flex-col sm:flex-row justify-between items-center gap-2 pt-4 border-t border-slate-100 text-xs text-slate-400">
                        <span>Build Version: {BUILD_VERSION}</span>
                        <span>
                          &copy; 2026 <a href="https://peterleroux.co.za/sans-10400-xa/" target="_blank" rel="noopener noreferrer" className="text-indigo-400 hover:text-indigo-600 hover:underline transition-colors">Peter le Roux</a>
                        </span>
                      </div>
                    </div>
                  </div>
                  <div className="p-4 border-t border-slate-200 bg-slate-50 flex justify-end">
                    <button onClick={() => setIsHelpModalOpen(false)} className="px-5 py-2 bg-slate-800 text-white rounded-lg text-sm font-bold shadow-sm hover:bg-slate-700">Close</button>
                  </div>
                </div>
              </div>
            )}
          </div> {/* Closes the max-w-5xl container div */}
        </div>       ); // Closes the return statement
    } // Closes the App() function

    // Mount the React 18 Application
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
