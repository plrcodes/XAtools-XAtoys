    const HelpCircle = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    const ExternalLink = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6m4-3h6v6m-11 5L21 3"/></svg>;
    const Droplet = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>;
    const Wand = ({style}) => <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 4 2 2"/><path d="m17.7 5.2-1.2 1.2"/><path d="M5 14c-1.1-1.6-.9-4.05.8-6.7m8 11 4.3-4.3"/><path d="M7 7l6 6"/><circle cx="15" cy="15" r="1"/></svg>;

    // --- COMPRESSED CONFIGURATIONS ---
    const BUILD_VERSION = "2.0.3 (LOCAL SAVING IMPLEMENTED)";
    const FENESTRATION_TARGETS = [{maxRatio:20,maxU:null,maxShgcUnshaded:null,maxShgcShaded:null},{maxRatio:25,maxU:5.20,maxShgcUnshaded:0.66,maxShgcShaded:0.49},{maxRatio:30,maxU:4.40,maxShgcUnshaded:0.56,maxShgcShaded:0.40},{maxRatio:35,maxU:3.50,maxShgcUnshaded:0.46,maxShgcShaded:0.33},{maxRatio:40,maxU:2.80,maxShgcUnshaded:0.36,maxShgcShaded:0.26},{maxRatio:45,maxU:2.20,maxShgcUnshaded:0.28,maxShgcShaded:0.20},{maxRatio:50,maxU:1.70,maxShgcUnshaded:0.21,maxShgcShaded:0.15},{maxRatio:55,maxU:1.40,maxShgcUnshaded:0.17,maxShgcShaded:0.12},{maxRatio:60,maxU:1.10,maxShgcUnshaded:0.14,maxShgcShaded:0.10},{maxRatio:100,maxU:0.90,maxShgcUnshaded:0.11,maxShgcShaded:0.08}];
    const getFenestrationTargets = (r) => r <= 0 ? FENESTRATION_TARGETS[0] : (FENESTRATION_TARGETS.find(t => r <= t.maxRatio) || FENESTRATION_TARGETS[9]);
    const LIGHTING_LIMITS={'A1':2,'A2':8,'A3':10,'A4':4,'C1':10,'C2':4,'E1':4,'E2':8,'E3':8,'E4':8,'F1':20,'F2':8,'F3':8,'G1':8,'H1':4,'H2':4,'H3':4,'H4':4,'H5':4,'J1':2,'J2':2,'J3':2,'J4':2};
    const HVAC_EQUIPMENT_TYPES=[{id:'through_wall',name:'Through-the-wall consoles (< 7kW)',getLimits:()=>({copC:2.8,copH:1.0,reqHeating:true})},{id:'unitary_split',name:'Unitary splits',getLimits:(c)=>({copC:c<10?3.2:2.8,copH:c<10?3.2:2.8,reqHeating:true})},{id:'vrf',name:'VRF systems',getLimits:(c)=>({copC:4.0,copH:3.5,reqHeating:false})},{id:'ptac',name:'PTAC units',getLimits:()=>({copC:2.5,copH:1.0,reqHeating:true})},{id:'portable',name:'Portable AC',getLimits:()=>({copC:2.2,copH:0,reqHeating:false})}];
    const WATER_DEMAND_RATES=[{label:"H4/H3 - Dwelling House (All other)",rate:115},{label:"H4/H3 - Dwelling House (Category 1)",rate:64},{label:"H1/H5 - Hotel / Hospitality",rate:140},{label:"H2 - Residential Institution",rate:95},{label:"Other",rate:80}];
    const WINDOW_PRESETS=[{name:'Clear (Aluminium)',uValue:7.90,shgc:0.81,type:'single'},{name:'Clear (Timber/uPVC)',uValue:5.60,shgc:0.76,type:'single'},{name:'Low-E (Aluminium)',uValue:5.50,shgc:0.64,type:'double'},{name:'Low-E (Timber/uPVC)',uValue:2.80,shgc:0.60,type:'double'},{name:'Triple Glazed',uValue:1.80,shgc:0.50,type:'triple'},{name:'High Performance Low-E',uValue:1.30,shgc:0.35,type:'triple'}];
    const MATERIAL_PRESETS=[{name:'Custom Material',type:'material',kValue:0.1,density:1000,specificHeat:1000},{name:'Custom Resistance / Air Gap',type:'resistance',rValue:0.18,density:1.2,specificHeat:1000}];
    const CLIMATE_ZONES=[{id:'1',name:'Zone 1 (Medium, Medium)'},{id:'2',name:'Zone 2 (Medium, Low)'},{id:'3',name:'Zone 3 (Low, High)'},{id:'4',name:'Zone 4 (Low, Low)'},{id:'5',name:'Zone 5 (Low, High)'},{id:'5H',name:'Zone 5H (Coastal High)'},{id:'6',name:'Zone 6 (High, High)'},{id:'7',name:'Zone 7 (Very High, Very High)'}];
    const OCCUPANCY_CLASSES=[{id:'A1',name:'A1 - Entertainment'},{id:'A2',name:'A2 - Theatrical/Sport'},{id:'A3',name:'A3 - Instruction'},{id:'A4',name:'A4 - Worship'},{id:'A5',name:'A5 - Outdoor'},{id:'C1',name:'C1 - Museums'},{id:'C2',name:'C2 - Library'},{id:'E1',name:'E1 - Shops'},{id:'E2',name:'E2 - Food Service'},{id:'E3',name:'E3 - Offices'},{id:'E4',name:'E4 - Parking'},{id:'F1',name:'F1 - Industrial'},{id:'F2',name:'F2 - Storage'},{id:'G1',name:'G1 - Residential'},{id:'H1',name:'H1 - Hotels'},{id:'H2',name:'H2 - Residential Institution'},{id:'H3',name:'H3 - Dwelling'},{id:'H4',name:'H4 - Dwelling'},{id:'H5',name:'H5 - Residential'},{id:'J1',name:'J1 - Transport'},{id:'J2',name:'J2 - Parking'},{id:'J3',name:'J3 - Airfield'},{id:'J4',name:'J4 - Other'}];
    const SA_TOWNS = [
{name:'Johannesburg',zone:'1',lat:26.2,sccp:false}
    ];

    // --- CUSTOM HOOK FOR LOCAL STORAGE PERSISTENCE ---
    function useStickyState(defaultValue, key) {
      const [value, setValue] = React.useState(() => {
        const stickyValue = window.localStorage.getItem(key);
        return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
      });
      React.useEffect(() => {
        window.localStorage.setItem(key, JSON.stringify(value));
      }, [key, value]);
      return [value, setValue];
    }

    function App() {
      const [activeTab, setActiveTab] = useStickyState('project', 'xa_activeTab');
      const [projectInfo, setProjectInfo] = useStickyState({ projectName:'', projectType:'new', location:'Johannesburg', customLocation:false, latitude:26.2, isSccp:false, storeys:1, occupancy:'E3' }, 'xa_projectInfo');
      const [isExempt, setIsExempt] = useState(false);
      
      useEffect(() => { setIsExempt(['J3', 'A5', 'D4'].includes(projectInfo.occupancy)); }, [projectInfo.occupancy]);

      const [spaces, setSpaces] = useStickyState([{ id: 'sp-1', name: 'Main Living Area', storey: 0, area: 150 }], 'xa_spaces');
      const [skylights, setSkylights] = useStickyState([], 'xa_skylights');
      const [lightingFixtures, setLightingFixtures] = useStickyState([{ id: 'lf-1', spaceId: 'sp-1', name: 'LED Downlight', type: 'LED', qty: 12, watts: 8 }], 'xa_lightingFixtures');
      const [hvacExempt, setHvacExempt] = useStickyState(false, 'xa_hvacExempt');
      const [hvacEquipment, setHvacEquipment] = useStickyState([{ id: 'hvac-1', name: 'Main Office AC', type: 'unitary_split', capacity: 12, copC: 3.2, copH: 3.3, resViolation: false }], 'xa_hvacEquipment');
      const [waterExempt, setWaterExempt] = useStickyState(false, 'xa_waterExempt');
      const [waterPop, setWaterPop] = useStickyState(4, 'xa_waterPop');
      const [waterRate, setWaterRate] = useStickyState(115, 'xa_waterRate'); 
      const [waterEquipment, setWaterEquipment] = useStickyState([{ id: 'weq-1', name: 'Solar Water Heater', yield: 200 }], 'xa_waterEquipment');
      const [waterPipes, setWaterPipes] = useStickyState([{ id: 'wp-1', reference: 'Main Hot Water Ring', diameter: 22, insulated: true }], 'xa_waterPipes');

      const [officeInfo, setOfficeInfo] = useState({ companyName: '', registeredProfessional: '', sacapNumber: '', logoDataUrl: '' });
      const [isSettingsModalOpen, setIsSettingsModalOpen] = useState(false);
      const [isHelpModalOpen, setIsHelpModalOpen] = useState(false);

      useEffect(() => {
        const saved = localStorage.getItem('sans10400_office_config');
        if (saved) { try { setOfficeInfo(JSON.parse(saved)); } catch (e) {} }
      }, []);

      useEffect(() => { localStorage.setItem('sans10400_office_config', JSON.stringify(officeInfo)); }, [officeInfo]);

      const handleOfficeUpdate = (field, value) => setOfficeInfo(prev => ({ ...prev, [field]: value }));
      const handleLogoUpload = (e) => { 
        const file = e.target.files[0]; 
        if (!file) return; 
        if (file.size > 1024 * 1024) { alert("File is too large! Please select an image under 1MB to ensure the browser can save it to memory."); e.target.value = ''; return; }
        const reader = new FileReader(); reader.onload = (evt) => handleOfficeUpdate('logoDataUrl', evt.target.result); reader.readAsDataURL(file); 
      };

      return (
        <div style={{ width: '100%', height: '100vh', display: 'flex', flexDirection: 'column', backgroundColor: '#f8fafc' }}>
          <div className="header">
            <h1>XA Express {BUILD_VERSION}</h1>
            <div className="flex gap-2">
              <button className="btn btn-secondary" onClick={() => setIsSettingsModalOpen(true)}>
                <Settings style={{ width: '20px', height: '20px' }} /> Settings
              </button>
              <button className="btn btn-secondary" onClick={() => setIsHelpModalOpen(true)}>
                <HelpCircle style={{ width: '20px', height: '20px' }} /> Help
              </button>
            </div>
          </div>

          <div className="main-layout">
            <div className="sidebar">
              <div className="sidebar-section">
                <div className="sidebar-title">Project Information</div>
                <div className="input-group">
                  <label>Project Name</label>
                  <input 
                    type="text" 
                    value={projectInfo.projectName} 
                    onChange={(e) => setProjectInfo(prev => ({ ...prev, projectName: e.target.value }))}
                    placeholder="Enter project name"
                  />
                </div>
                <div className="input-group">
                  <label>Location</label>
                  <select 
                    value={projectInfo.location}
                    onChange={(e) => {
                      const val = e.target.value;
                      if (val === 'CUSTOM') { 
                        setProjectInfo(prev => ({ ...prev, location: '', customLocation: true })); 
                      } else {
                        setProjectInfo(prev => ({ ...prev, location: val, customLocation: false }));
                      }
                    }}
                  >
                    <option value="Johannesburg">Johannesburg</option>
                    <option value="CUSTOM">Custom Location</option>
                  </select>
                </div>
                <div className="input-group">
                  <label>Occupancy Class</label>
                  <select 
                    value={projectInfo.occupancy}
                    onChange={(e) => setProjectInfo(prev => ({ ...prev, occupancy: e.target.value }))}
                  >
                    {OCCUPANCY_CLASSES.map(oc => <option key={oc.id} value={oc.id}>{oc.name}</option>)}
                  </select>
                </div>
              </div>
            </div>

            <div className="content">
              <div className="tabs">
                <button 
                  className={`tab-btn ${activeTab === 'project' ? 'active' : ''}`}
                  onClick={() => setActiveTab('project')}
                >
                  Project
                </button>
                <button 
                  className={`tab-btn ${activeTab === 'walls' ? 'active' : ''}`}
                  onClick={() => setActiveTab('walls')}
                >
                  Walls
                </button>
                <button 
                  className={`tab-btn ${activeTab === 'roofs' ? 'active' : ''}`}
                  onClick={() => setActiveTab('roofs')}
                >
                  Roofs
                </button>
                <button 
                  className={`tab-btn ${activeTab === 'floors' ? 'active' : ''}`}
                  onClick={() => setActiveTab('floors')}
                >
                  Floors
                </button>
                <button 
                  className={`tab-btn ${activeTab === 'fenestration' ? 'active' : ''}`}
                  onClick={() => setActiveTab('fenestration')}
                >
                  Fenestration
                </button>
              </div>

              {activeTab === 'project' && (
                <div className="box">
                  <h2>Project Overview</h2>
                  <p><strong>Project Name:</strong> {projectInfo.projectName || 'Not specified'}</p>
                  <p><strong>Location:</strong> {projectInfo.location || 'Not specified'}</p>
                  <p><strong>Occupancy Class:</strong> {projectInfo.occupancy || 'Not specified'}</p>
                  <p style={{ marginTop: '20px', color: '#64748b', fontSize: '13px' }}>Build Version: {BUILD_VERSION}</p>
                </div>
              )}

              {activeTab === 'walls' && (
                <div className="box">
                  <h2>Walls Assembly</h2>
                  <p>Configure wall thermal properties and assemblies.</p>
                </div>
              )}

              {activeTab === 'roofs' && (
                <div className="box">
                  <h2>Roof Assembly</h2>
                  <p>Configure roof thermal properties and assemblies.</p>
                </div>
              )}

              {activeTab === 'floors' && (
                <div className="box">
                  <h2>Floor Assembly</h2>
                  <p>Configure floor thermal properties and assemblies.</p>
                </div>
              )}

              {activeTab === 'fenestration' && (
                <div className="box">
                  <h2>Fenestration Schedule</h2>
                  <p>Configure windows and glazing specifications.</p>
                </div>
              )}
            </div>
          </div>

          {isSettingsModalOpen && (
            <div className="modal open">
              <div className="modal-content">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                  <h2 style={{ margin: '0', fontSize: '20px', fontWeight: '600' }}>Settings</h2>
                  <button className="btn btn-secondary btn-sm" onClick={() => setIsSettingsModalOpen(false)}>
                    <X style={{ width: '18px', height: '18px' }} />
                  </button>
                </div>
                <div className="input-group">
                  <label>Company Name</label>
                  <input 
                    type="text"
                    value={officeInfo.companyName}
                    onChange={(e) => handleOfficeUpdate('companyName', e.target.value)}
                    placeholder="Enter company name"
                  />
                </div>
                <div className="input-group">
                  <label>Registered Professional</label>
                  <input 
                    type="text"
                    value={officeInfo.registeredProfessional}
                    onChange={(e) => handleOfficeUpdate('registeredProfessional', e.target.value)}
                    placeholder="Enter registered professional name"
                  />
                </div>
                <div className="input-group">
                  <label>SACAP Number</label>
                  <input 
                    type="text"
                    value={officeInfo.sacapNumber}
                    onChange={(e) => handleOfficeUpdate('sacapNumber', e.target.value)}
                    placeholder="Enter SACAP number"
                  />
                </div>
                <div className="input-group">
                  <label>Logo</label>
                  <input 
                    type="file"
                    accept="image/*"
                    onChange={handleLogoUpload}
                  />
                </div>
                <button className="btn btn-primary" onClick={() => setIsSettingsModalOpen(false)}>
                  Done
                </button>
              </div>
            </div>
          )}

          {isHelpModalOpen && (
            <div className="modal open">
              <div className="modal-content">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                  <h2 style={{ margin: '0', fontSize: '20px', fontWeight: '600' }}>Help</h2>
                  <button className="btn btn-secondary btn-sm" onClick={() => setIsHelpModalOpen(false)}>
                    <X style={{ width: '18px', height: '18px' }} />
                  </button>
                </div>
                <p>XA Express is a tool for calculating compliance with SANS 10400-XA building energy standards.</p>
                <p><strong>Getting Started:</strong></p>
                <ul style={{ marginLeft: '20px', color: '#475569' }}>
                  <li>Enter your project information in the Project tab</li>
                  <li>Configure wall, roof, and floor assemblies</li>
                  <li>Define fenestration (windows) specifications</li>
                  <li>Review compliance status for each section</li>
                </ul>
                <button className="btn btn-primary" onClick={() => setIsHelpModalOpen(false)}>
                  Close
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
