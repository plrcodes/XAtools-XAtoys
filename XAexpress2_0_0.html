    // CUSTOM HOOK FOR LOCAL STORAGE
    function useStickyState(defaultValue, key) {
      const [value, setValue] = React.useState(() => {
        const stickyValue = window.localStorage.getItem(key);
        return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
      });
      React.useEffect(() => {
        window.localStorage.setItem(key, JSON.stringify(value));
      }, [key, value]);
      return [value, setValue];
    }

    function App() {
      const [activeTab, setActiveTab] = useStickyState('project', 'xa_activeTab');
      const [projectInfo, setProjectInfo] = useStickyState({ projectName:'', projectType:'new', location:'Johannesburg', customLocation:false, latitude:26.2, zone:'1', isSccp:false, storeys:1, occupancy:'E3' }, 'xa_projectInfo');
      const [isExempt, setIsExempt] = useState(false);
      
      useEffect(() => { setIsExempt(['J3', 'A5', 'D4'].includes(projectInfo.occupancy)); }, [projectInfo.occupancy]);

      const handleLocationChange = (e) => {
        const val = e.target.value;
        if (val === 'CUSTOM') { 
          setProjectInfo(prev => ({ ...prev, location: '', customLocation: true })); 
          return; 
        }
        const matched = SA_TOWNS.find(t => t.name === val);
        if (matched) {
          setProjectInfo(prev => ({ ...prev, location: matched.name, customLocation: false, zone: matched.zone, latitude: matched.lat, isSccp: matched.sccp }));
        }
      };

      return (
        <div className="flex flex-col h-screen bg-slate-50">
          <div className="bg-white border-b shadow-sm p-4 flex items-center justify-between">
            <h1 className="text-3xl font-bold">XA Express {BUILD_VERSION}</h1>
            <div className="flex gap-3">
              <button className="btn btn-secondary btn-sm"><Settings className="w-5 h-5" /> Settings</button>
              <button className="btn btn-secondary btn-sm"><HelpCircle className="w-5 h-5" /> Help</button>
            </div>
          </div>

          <div className="flex flex-1 overflow-hidden">
            <div className="w-80 bg-white border-r p-6 overflow-y-auto">
              <div className="mb-8">
                <h3 className="text-sm font-bold uppercase text-slate-600 mb-3">Project Info</h3>
                <div className="mb-4">
                  <label>Project Name</label>
                  <input type="text" value={projectInfo.projectName} onChange={(e) => setProjectInfo(prev => ({ ...prev, projectName: e.target.value }))} />
                </div>
                <div className="mb-4">
                  <label>Location</label>
                  <select value={projectInfo.location} onChange={handleLocationChange}>
                    <option value="">Select a town...</option>
                    {SA_TOWNS.map(town => <option key={town.name} value={town.name}>{town.name}</option>)}
                    <option value="CUSTOM">Custom Location</option>
                  </select>
                </div>
                <div className="mb-4">
                  <label>Occupancy Class</label>
                  <select value={projectInfo.occupancy} onChange={(e) => setProjectInfo(prev => ({ ...prev, occupancy: e.target.value }))}>
                    {OCCUPANCY_CLASSES.map(oc => <option key={oc.id} value={oc.id}>{oc.name}</option>)}
                  </select>
                </div>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-6">
              <div className="tabs">
                <button className={`tab-btn ${activeTab === 'project' ? 'active' : ''}`} onClick={() => setActiveTab('project')}>Project</button>
                <button className={`tab-btn ${activeTab === 'walls' ? 'active' : ''}`} onClick={() => setActiveTab('walls')}>Walls</button>
                <button className={`tab-btn ${activeTab === 'roofs' ? 'active' : ''}`} onClick={() => setActiveTab('roofs')}>Roofs</button>
                <button className={`tab-btn ${activeTab === 'floors' ? 'active' : ''}`} onClick={() => setActiveTab('floors')}>Floors</button>
                <button className={`tab-btn ${activeTab === 'fenestration' ? 'active' : ''}`} onClick={() => setActiveTab('fenestration')}>Fenestration</button>
              </div>

              <div className="box">
                {activeTab === 'project' && (
                  <>
                    <h2>Project Overview</h2>
                    <p><strong>Project Name:</strong> {projectInfo.projectName || 'Not specified'}</p>
                    <p><strong>Location:</strong> {projectInfo.location || 'Not specified'}</p>
                    <p><strong>Zone:</strong> {projectInfo.zone || 'Not specified'}</p>
                    <p><strong>Occupancy Class:</strong> {projectInfo.occupancy || 'Not specified'}</p>
                    <p><strong>Storeys:</strong> {projectInfo.storeys}</p>
                    <p className="text-xs text-slate-600 mt-6">Build Version: {BUILD_VERSION}</p>
                  </>
                )}
                {activeTab === 'walls' && <h2>Walls Assembly Configuration</h2>}
                {activeTab === 'roofs' && <h2>Roofs Assembly Configuration</h2>}
                {activeTab === 'floors' && <h2>Floors Assembly Configuration</h2>}
                {activeTab === 'fenestration' && <h2>Fenestration Schedule</h2>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
